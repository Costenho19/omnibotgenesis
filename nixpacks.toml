# Nixpacks configuration for Railway deployment
# OMNIX Telegram Bot - Python 3.11

providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "libffi", "openssl"]

[phases.install]
cmds = ["python3.11 -m pip install --upgrade pip", "python3.11 -m pip install -r requirements.txt"]

[start]
cmd = "python3.11 -u main.py"
