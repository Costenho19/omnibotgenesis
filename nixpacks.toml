# Nixpacks configuration — omnibotgenesis Telegram Bot
# start command is defined in railway.json: "python -u main.py"

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r requirements.txt"
]

[phases.start]
cmd = "python -u main.py"
