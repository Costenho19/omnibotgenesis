# Nixpacks configuration — OMNIX Dashboard

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/pip install ./omnix_core --no-deps --quiet",
  "/opt/venv/bin/pip install ./omnix_services --no-deps --quiet",
  "pip install ./omnix_core --no-deps --quiet || true",
  "pip install ./omnix_services --no-deps --quiet || true"
]

[start]
cmd = "PYTHONPATH=/app:/app/omnix_web:$PYTHONPATH /opt/venv/bin/gunicorn --bind=0.0.0.0:${PORT:-8080} --reuse-port --workers=2 --timeout=120 omnix_dashboard.app:app"
