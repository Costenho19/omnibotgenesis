# Nixpacks configuration for Railway deployment
# OMNIX Quantum - Dashboard + Web

[phases.setup]
nixPkgs = ["python312", "nodejs_20", "caddy"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd omnix_web && npm install"
]

[phases.build]
cmds = [
  "cd omnix_web && npm run build",
  "cp /app/Caddyfile /app/omnix-custom.caddyfile"
]

[start]
cmd = "caddy run --config /app/omnix-custom.caddyfile & gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 120 omnix_dashboard.app:app"
