# Nixpacks configuration for Railway deployment
# OMNIX Quantum - Dashboard + Web
# Flask/gunicorn handles ALL routing (API + static files). No Caddy needed.

[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd omnix_web && npm install"
]

[phases.build]
cmds = [
  "cd omnix_web && npm run build"
]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --worker-class sync omnix_dashboard.app:app"
