<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="900" height="500" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#e8d5a3" font-size="22" font-weight="bold" letter-spacing="2">THE ANATOMY OF GHOST COMPLIANCE</text>
  <line x1="150" y1="58" x2="750" y2="58" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- LEFT SIDE: Conventional System -->
  <text x="225" y="95" text-anchor="middle" fill="#888" font-size="13" letter-spacing="1">CONVENTIONAL GOVERNANCE</text>

  <!-- Timeline line left -->
  <line x1="225" y1="110" x2="225" y2="420" stroke="#333" stroke-width="2"/>

  <!-- Admission point -->
  <circle cx="225" cy="140" r="10" fill="#c9a84c"/>
  <text x="250" y="145" fill="#e8d5a3" font-size="12">Admission — System captures state</text>

  <!-- Photo icon -->
  <rect x="165" y="165" width="120" height="75" rx="6" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="225" y="192" text-anchor="middle" fill="#c9a84c" font-size="11" font-weight="bold">📷 PHOTOGRAPH</text>
  <text x="225" y="210" text-anchor="middle" fill="#888" font-size="10">Volatility: 12%</text>
  <text x="225" y="224" text-anchor="middle" fill="#888" font-size="10">Correlation: 0.23 · Liquidity: HIGH</text>

  <!-- Drift zone -->
  <rect x="140" y="255" width="170" height="90" rx="6" fill="#1a0a0a" stroke="#8b2222" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="225" y="275" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">REALITY DRIFTS</text>
  <text x="225" y="293" text-anchor="middle" fill="#888" font-size="10">Volatility: 34%</text>
  <text x="225" y="308" text-anchor="middle" fill="#888" font-size="10">Correlation: 0.81 · Liquidity: LOW</text>
  <text x="225" y="324" text-anchor="middle" fill="#666" font-size="9">System still enforces against</text>
  <text x="225" y="337" text-anchor="middle" fill="#666" font-size="9">the January photograph</text>

  <!-- System says GREEN -->
  <rect x="165" y="360" width="120" height="40" rx="6" fill="#0d2a0d" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="225" y="378" text-anchor="middle" fill="#44ff44" font-size="13" font-weight="bold">● COMPLIANT</text>
  <text x="225" y="393" text-anchor="middle" fill="#666" font-size="9">Dashboard says green</text>

  <!-- CRISIS label -->
  <text x="225" y="435" text-anchor="middle" fill="#ff4444" font-size="11">Crisis arrives. No warning.</text>

  <!-- CENTER DIVIDER -->
  <line x1="450" y1="70" x2="450" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="450" y="465" text-anchor="middle" fill="#444" font-size="11">vs</text>

  <!-- RIGHT SIDE: OMNIX -->
  <text x="675" y="95" text-anchor="middle" fill="#c9a84c" font-size="13" letter-spacing="1">OMNIX GOVERNANCE</text>

  <!-- Timeline line right -->
  <line x1="675" y1="110" x2="675" y2="420" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

  <!-- CAG Point -->
  <circle cx="675" cy="140" r="10" fill="#c9a84c"/>
  <text x="700" y="145" fill="#e8d5a3" font-size="12">CAG — Admission Score: 87</text>

  <!-- Continuous monitoring -->
  <rect x="590" y="165" width="170" height="75" rx="6" fill="#0a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="675" y="187" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">🎥 LIVE MONITORING</text>
  <text x="675" y="205" text-anchor="middle" fill="#888" font-size="10">AVM evaluating 6 signals</text>
  <text x="675" y="220" text-anchor="middle" fill="#888" font-size="10">continuously · in real time</text>
  <text x="675" y="234" text-anchor="middle" fill="#888" font-size="10">PQC receipt per decision</text>

  <!-- Drift detected -->
  <rect x="590" y="255" width="170" height="70" rx="6" fill="#1a1500" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="675" y="275" text-anchor="middle" fill="#ffaa00" font-size="11" font-weight="bold">⚡ DRIFT DETECTED</text>
  <text x="675" y="293" text-anchor="middle" fill="#888" font-size="10">Signal coherence falling</text>
  <text x="675" y="308" text-anchor="middle" fill="#888" font-size="10">Stress resilience at threshold</text>
  <text x="675" y="322" text-anchor="middle" fill="#888" font-size="9">Alert generated → Human review</text>

  <!-- System responds -->
  <rect x="615" y="340" width="120" height="55" rx="6" fill="#0a1a0a" stroke="#44ff44" stroke-width="1.5"/>
  <text x="675" y="358" text-anchor="middle" fill="#44ff44" font-size="11" font-weight="bold">GOVERNED</text>
  <text x="675" y="374" text-anchor="middle" fill="#888" font-size="10">Intervention before</text>
  <text x="675" y="388" text-anchor="middle" fill="#888" font-size="10">crisis materializes</text>

  <text x="675" y="435" text-anchor="middle" fill="#44ff44" font-size="11">Problem resolved. Evidence preserved.</text>

  <!-- Bottom caption -->
  <text x="450" y="490" text-anchor="middle" fill="#555" font-size="10" letter-spacing="1">OMNIX QUANTUM · omnixquantum.net · Ghost Compliance Framework</text>
</svg>
