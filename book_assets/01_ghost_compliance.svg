  <rect x="580" y="388" width="340" height="60" rx="6" fill="#071520" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="750" y="412" text-anchor="middle" fill="#8B5CF6" font-size="13" font-weight="bold">⚡ ALERT — Human Review Triggered</text>
  <text x="750" y="432" text-anchor="middle" fill="#64748B" font-size="10">PQC-signed receipt generated · intervention window open</text>

  <!-- Arrow down -->
  <line x1="750" y1="448" x2="750" y2="475" stroke="#10B981" stroke-width="2"/>
  <polygon points="744,472 750,482 756,472" fill="#10B981"/>

  <!-- Step 4: Resolved -->
  <rect x="580" y="482" width="340" height="42" rx="6" fill="#071512" stroke="#10B981" stroke-width="2"/>
  <text x="750" y="507" text-anchor="middle" fill="#10B981" font-size="13" font-weight="bold">RESOLVED — Evidence Preserved</text>

  <!-- Center VS -->
  <text x="500" y="335" text-anchor="middle" fill="#1E293B" font-size="28" font-weight="bold">VS</text>
  <line x1="500" y1="100" x2="500" y2="550" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1000" height="30" fill="#050D18"/>
  <text x="500" y="590" text-anchor="middle" fill="#475569" font-size="10" letter-spacing="2">OMNIX QUANTUM  ·  omnixquantum.net  ·  Continuous Governance Infrastructure</text>
</svg>
