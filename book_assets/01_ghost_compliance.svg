  <!-- Title block -->
  <text x="500" y="48" text-anchor="middle" fill="#E5E4E2" font-size="24" font-weight="bold" letter-spacing="4">GHOST COMPLIANCE</text>
  <text x="500" y="72" text-anchor="middle" fill="#94A3B8" font-size="12" letter-spacing="3">THE SILENT FAILURE MODE OF GOVERNANCE SYSTEMS</text>
  <line x1="60" y1="85" x2="940" y2="85" stroke="#C9A227" stroke-width="1" opacity="0.5"/>

  <!-- LEFT PANEL: Conventional -->
  <rect x="40" y="100" width="420" height="450" rx="10" fill="url(#leftPanelGrad)" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="40" y="100" width="420" height="44" rx="10" fill="#1E293B"/>
  <rect x="40" y="130" width="420" height="14" fill="#1E293B"/>
  <text x="250" y="128" text-anchor="middle" fill="#94A3B8" font-size="12" letter-spacing="3">CONVENTIONAL GOVERNANCE</text>

  <!-- Step 1: Admission -->
  <rect x="80" y="165" width="340" height="70" rx="6" fill="#0F1E35" stroke="#1E293B" stroke-width="1"/>
  <circle cx="108" cy="200" r="16" fill="#1E293B" stroke="#C9A227" stroke-width="1.5"/>
  <text x="108" y="205" text-anchor="middle" fill="#C9A227" font-size="13" font-weight="bold">1</text>
  <text x="230" y="191" text-anchor="middle" fill="#E5E4E2" font-size="12" font-weight="bold">ADMISSION — PHOTOGRAPH TAKEN</text>
  <text x="230" y="212" text-anchor="middle" fill="#94A3B8" font-size="10">Volatility: 12% · Correlation: 0.23 · Liquidity: HIGH</text>
  <text x="230" y="228" text-anchor="middle" fill="#94A3B8" font-size="10">Macro context: Stable · Score: APPROVED</text>

  <!-- Arrow down -->
  <line x1="250" y1="235" x2="250" y2="268" stroke="#1E293B" stroke-width="2"/>
  <polygon points="244,265 250,275 256,265" fill="#1E293B"/>

  <!-- Step 2: World moves -->
  <rect x="80" y="278" width="340" height="70" rx="6" fill="#0F1E35" stroke="#EF4444" stroke-width="1" stroke-dasharray="5,3"/>
  <circle cx="108" cy="313" r="16" fill="#1a0808" stroke="#EF4444" stroke-width="1.5"/>
  <text x="108" y="318" text-anchor="middle" fill="#EF4444" font-size="13" font-weight="bold">2</text>
  <text x="230" y="300" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="bold">REALITY DRIFTS — UNDETECTED</text>
  <text x="230" y="320" text-anchor="middle" fill="#94A3B8" font-size="10">Volatility: 34% · Correlation: 0.81 · Liquidity: LOW</text>
  <text x="230" y="338" text-anchor="middle" fill="#94A3B8" font-size="10">Macro context: Stressed · System: still enforcing Jan data</text>

  <!-- Arrow down -->
  <line x1="250" y1="348" x2="250" y2="378" stroke="#1E293B" stroke-width="2"/>
  <polygon points="244,375 250,385 256,375" fill="#1E293B"/>

  <!-- Step 3: System says green -->
  <rect x="80" y="388" width="340" height="60" rx="6" fill="#0A1F0A" stroke="#10B981" stroke-width="1.5"/>
  <text x="250" y="412" text-anchor="middle" fill="#10B981" font-size="13" font-weight="bold">● COMPLIANT — Dashboard Green</text>
  <text x="250" y="432" text-anchor="middle" fill="#64748B" font-size="10">System enforcing against January photograph</text>

  <!-- Arrow down -->
  <line x1="250" y1="448" x2="250" y2="475" stroke="#EF4444" stroke-width="2"/>
  <polygon points="244,472 250,482 256,472" fill="#EF4444"/>

  <!-- Step 4: Crisis -->
  <rect x="80" y="482" width="340" height="42" rx="6" fill="#1a0808" stroke="#EF4444" stroke-width="2"/>
  <text x="250" y="507" text-anchor="middle" fill="#EF4444" font-size="13" font-weight="bold">CRISIS — NO WARNING GENERATED</text>

  <!-- RIGHT PANEL: OMNIX -->
  <rect x="540" y="100" width="420" height="450" rx="10" fill="url(#rightPanelGrad)" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="540" y="100" width="420" height="44" rx="10" fill="#0A1F14"/>
  <rect x="540" y="130" width="420" height="14" fill="#0A1F14"/>
  <text x="750" y="128" text-anchor="middle" fill="#C9A227" font-size="12" letter-spacing="3">OMNIX QUANTUM GOVERNANCE</text>

  <!-- Step 1: CAG -->
  <rect x="580" y="165" width="340" height="70" rx="6" fill="#071512" stroke="#C9A227" stroke-width="1.5"/>
  <circle cx="608" cy="200" r="16" fill="#1a1400" stroke="#C9A227" stroke-width="1.5"/>
  <text x="608" y="205" text-anchor="middle" fill="#C9A227" font-size="13" font-weight="bold">1</text>
  <text x="730" y="191" text-anchor="middle" fill="#E5E4E2" font-size="12" font-weight="bold">CAG — ADMISSION + COMPREHENSION</text>
  <text x="730" y="212" text-anchor="middle" fill="#94A3B8" font-size="10">4 axes evaluated simultaneously · Admission Score: 87</text>
  <text x="730" y="228" text-anchor="middle" fill="#94A3B8" font-size="10">Reference state captured with mathematical precision</text>

  <!-- Arrow down -->
  <line x1="750" y1="235" x2="750" y2="268" stroke="#C9A227" stroke-width="2" opacity="0.5"/>
  <polygon points="744,265 750,275 756,265" fill="#C9A227" opacity="0.5"/>

