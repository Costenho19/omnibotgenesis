  <text x="730" y="300" text-anchor="middle" fill="#E5E4E2" font-size="12" font-weight="bold">AVM — CONTINUOUS MONITORING</text>
  <text x="730" y="320" text-anchor="middle" fill="#94A3B8" font-size="10">6 signals evaluated in real time · drift detected early</text>
  <text x="730" y="338" text-anchor="middle" fill="#94A3B8" font-size="10">Signal coherence falling · stress resilience at threshold</text>

  <!-- Arrow down -->
  <line x1="750" y1="348" x2="750" y2="378" stroke="#C9A227" stroke-width="2" opacity="0.5"/>
  <polygon points="744,375 750,385 756,375" fill="#C9A227" opacity="0.5"/>

