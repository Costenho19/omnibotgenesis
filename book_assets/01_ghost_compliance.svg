  <rect x="580" y="278" width="340" height="70" rx="6" fill="#071512" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="608" cy="313" r="16" fill="#071522" stroke="#3B82F6" stroke-width="1.5"/>
