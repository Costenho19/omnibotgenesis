<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="900" height="580" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e8d5a3" font-size="22" font-weight="bold" letter-spacing="2">OMNIX QUANTUM — GOVERNANCE ARCHITECTURE</text>
  <line x1="100" y1="54" x2="800" y2="54" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- LAYER 1: INPUT -->
  <text x="50" y="90" fill="#555" font-size="10" letter-spacing="2">INPUT LAYER</text>
  <rect x="50" y="98" width="800" height="50" rx="6" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <text x="200" y="128" text-anchor="middle" fill="#888" font-size="11">Market Data</text>
  <text x="380" y="128" text-anchor="middle" fill="#888" font-size="11">Asset Signals</text>
  <text x="550" y="128" text-anchor="middle" fill="#888" font-size="11">Regulatory Context</text>
  <text x="730" y="128" text-anchor="middle" fill="#888" font-size="11">Macroeconomic State</text>
  <line x1="300" y1="108" x2="300" y2="138" stroke="#333" stroke-width="1"/>
  <line x1="460" y1="108" x2="460" y2="138" stroke="#333" stroke-width="1"/>
  <line x1="640" y1="108" x2="640" y2="138" stroke="#333" stroke-width="1"/>

  <!-- Arrow down -->
  <line x1="450" y1="148" x2="450" y2="168" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="444,165 450,175 456,165" fill="#c9a84c"/>

  <!-- LAYER 2: CAG -->
  <text x="50" y="190" fill="#555" font-size="10" letter-spacing="2">ADMISSION LAYER</text>
  <rect x="250" y="198" width="400" height="60" rx="8" fill="#0a1020" stroke="#c9a84c" stroke-width="2"/>
  <text x="450" y="223" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">CONTEXT ADMISSION GATE</text>
  <text x="450" y="242" text-anchor="middle" fill="#888" font-size="10">Volatility · Correlation · Liquidity · Macro Context → Admission Score 0–100</text>

  <!-- Arrows from CAG -->
  <line x1="450" y1="258" x2="450" y2="278" stroke="#4a9eff" stroke-width="2"/>
  <polygon points="444,275 450,285 456,275" fill="#4a9eff"/>

  <!-- SESSION ADMITTED badge -->
  <rect x="335" y="290" width="230" height="28" rx="14" fill="#0d2a0d" stroke="#44ff88" stroke-width="1.5"/>
  <text x="450" y="309" text-anchor="middle" fill="#44ff88" font-size="11" font-weight="bold">SESSION_ADMITTED → Governance Active</text>

  <!-- Arrow down -->
  <line x1="450" y1="318" x2="450" y2="338" stroke="#4a9eff" stroke-width="2"/>
  <polygon points="444,335 450,345 456,335" fill="#4a9eff"/>

  <!-- LAYER 3: MONITORING -->
  <text x="50" y="358" fill="#555" font-size="10" letter-spacing="2">CONTINUOUS MONITORING LAYER</text>

  <!-- AVM -->
  <rect x="60" y="365" width="220" height="75" rx="8" fill="#0a1020" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="170" y="389" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="bold">AVM</text>
  <text x="170" y="407" text-anchor="middle" fill="#888" font-size="9">Assumption Validity Monitor</text>
  <text x="170" y="422" text-anchor="middle" fill="#888" font-size="9">6 signals · continuous · real-time</text>
  <text x="170" y="435" text-anchor="middle" fill="#888" font-size="9">Auto-recalibration</text>

  <!-- SRR -->
  <rect x="340" y="365" width="220" height="75" rx="8" fill="#0a1020" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="450" y="389" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">SYSTEMIC RISK ROUTER</text>
  <text x="450" y="407" text-anchor="middle" fill="#888" font-size="9">Cross-position interaction analysis</text>
  <text x="450" y="422" text-anchor="middle" fill="#888" font-size="9">Contagion detection</text>
  <text x="450" y="435" text-anchor="middle" fill="#888" font-size="9">Pre-threshold intervention</text>

  <!-- MCM -->
  <rect x="620" y="365" width="220" height="75" rx="8" fill="#0a1020" stroke="#aa44ff" stroke-width="1.5"/>
  <text x="730" y="389" text-anchor="middle" fill="#aa44ff" font-size="12" font-weight="bold">META-COHERENCE</text>
  <text x="730" y="407" text-anchor="middle" fill="#aa44ff" font-size="12" font-weight="bold">MONITOR</text>
  <text x="730" y="422" text-anchor="middle" fill="#888" font-size="9">Framework integrity</text>
  <text x="730" y="435" text-anchor="middle" fill="#888" font-size="9">Second-order drift detection</text>

  <!-- Arrow down -->
  <line x1="450" y1="440" x2="450" y2="460" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="444,457 450,467 456,457" fill="#c9a84c"/>

  <!-- LAYER 4: EVIDENCE -->
  <text x="50" y="480" fill="#555" font-size="10" letter-spacing="2">EVIDENCE LAYER</text>

  <!-- FAT -->
  <rect x="60" y="488" width="240" height="60" rx="8" fill="#0a1020" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="180" y="511" text-anchor="middle" fill="#c9a84c" font-size="11" font-weight="bold">FORENSIC AUDIT TRAIL</text>
  <text x="180" y="528" text-anchor="middle" fill="#888" font-size="9">4 rounds · irrefutable · immutable</text>
  <text x="180" y="542" text-anchor="middle" fill="#888" font-size="9">ML-DSA-65 signed receipts</text>

  <!-- Anti-Replay -->
  <rect x="330" y="488" width="240" height="60" rx="8" fill="#0a1020" stroke="#ffaa44" stroke-width="1.5"/>
  <text x="450" y="511" text-anchor="middle" fill="#ffaa44" font-size="11" font-weight="bold">ANTI-REPLAY PROTECTION</text>
  <text x="450" y="528" text-anchor="middle" fill="#888" font-size="9">Each decision: unique, irrepeatible</text>
  <text x="450" y="542" text-anchor="middle" fill="#888" font-size="9">Temporal + systemic binding</text>

  <!-- Human Override -->
  <rect x="600" y="488" width="240" height="60" rx="8" fill="#0a1020" stroke="#44ff88" stroke-width="1.5"/>
  <text x="720" y="511" text-anchor="middle" fill="#44ff88" font-size="11" font-weight="bold">HUMAN OVERRIDE</text>
  <text x="720" y="528" text-anchor="middle" fill="#888" font-size="9">EU AI Act Art.14 compliant</text>
  <text x="720" y="542" text-anchor="middle" fill="#888" font-size="9">PQC-signed · auditable</text>

  <!-- Bottom label -->
  <text x="450" y="572" text-anchor="middle" fill="#555" font-size="9" letter-spacing="1">OMNIX QUANTUM · omnixquantum.net · Post-Quantum Cryptography throughout</text>
</svg>
