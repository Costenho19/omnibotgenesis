<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="900" height="440" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e8d5a3" font-size="22" font-weight="bold" letter-spacing="2">THE QUANTUM THREAT TIMELINE</text>
  <text x="450" y="63" text-anchor="middle" fill="#888" font-size="12" letter-spacing="1">Why post-quantum cryptography is an engineering decision for today — not tomorrow</text>
  <line x1="100" y1="76" x2="800" y2="76" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- Timeline base -->
  <line x1="80" y1="220" x2="840" y2="220" stroke="#333" stroke-width="2"/>

  <!-- Gradient threat zone -->
  <defs>
    <linearGradient id="threatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Years -->
  <!-- 2024: x=130, 2026: x=250, 2028: x=370, 2030: x=490, 2032: x=610, 2035: x=780 -->

  <!-- Year markers -->
  <text x="130" y="240" text-anchor="middle" fill="#888" font-size="11">2024</text>
  <line x1="130" y1="215" x2="130" y2="225" stroke="#555" stroke-width="1"/>

  <text x="250" y="240" text-anchor="middle" fill="#888" font-size="11">2026</text>
  <line x1="250" y1="215" x2="250" y2="225" stroke="#555" stroke-width="1"/>

  <text x="370" y="240" text-anchor="middle" fill="#888" font-size="11">2028</text>
  <line x1="370" y1="215" x2="370" y2="225" stroke="#555" stroke-width="1"/>

  <text x="490" y="240" text-anchor="middle" fill="#888" font-size="11">2030</text>
  <line x1="490" y1="215" x2="490" y2="225" stroke="#555" stroke-width="1"/>

  <text x="610" y="240" text-anchor="middle" fill="#888" font-size="11">2032</text>
  <line x1="610" y1="215" x2="610" y2="225" stroke="#555" stroke-width="1"/>

  <text x="770" y="240" text-anchor="middle" fill="#888" font-size="11">2035+</text>
  <line x1="770" y1="215" x2="770" y2="225" stroke="#555" stroke-width="1"/>

  <!-- NOW marker -->
  <line x1="155" y1="140" x2="155" y2="220" stroke="#c9a84c" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="120" y="128" width="70" height="20" rx="4" fill="#1a1500" stroke="#c9a84c" stroke-width="1"/>
  <text x="155" y="142" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">TODAY</text>

  <!-- Events above timeline -->
  <!-- 2024: NIST Standards -->
  <circle cx="130" cy="220" r="6" fill="#44ff88"/>
  <line x1="130" y1="214" x2="130" y2="160" stroke="#44ff88" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="55" y="120" width="150" height="38" rx="4" fill="#0a1a0a" stroke="#44ff88" stroke-width="1"/>
  <text x="130" y="136" text-anchor="middle" fill="#44ff88" font-size="9" font-weight="bold">NIST PQC Standards</text>
  <text x="130" y="150" text-anchor="middle" fill="#888" font-size="9">ML-DSA-65 published</text>

  <!-- 2025: Harvest Now -->
  <circle cx="190" cy="220" r="6" fill="#ff4444"/>
  <line x1="190" y1="214" x2="190" y2="95" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="115" y="70" width="150" height="38" rx="4" fill="#1a0a0a" stroke="#ff4444" stroke-width="1"/>
  <text x="190" y="86" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="bold">Harvest Now</text>
  <text x="190" y="100" text-anchor="middle" fill="#888" font-size="9">Decrypt Later attacks active</text>

  <!-- 2026: MiCA -->
  <circle cx="250" cy="220" r="6" fill="#c9a84c"/>
  <line x1="250" y1="214" x2="250" y2="155" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="175" y="118" width="150" height="38" rx="4" fill="#1a1500" stroke="#c9a84c" stroke-width="1"/>
  <text x="250" y="134" text-anchor="middle" fill="#c9a84c" font-size="9" font-weight="bold">MiCA Full Enforcement</text>
  <text x="250" y="148" text-anchor="middle" fill="#888" font-size="9">EU AI Act active</text>

  <!-- 2028: Migration deadline -->
  <circle cx="370" cy="220" r="6" fill="#ffaa44"/>
  <line x1="370" y1="214" x2="370" y2="95" stroke="#ffaa44" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="295" y="70" width="150" height="38" rx="4" fill="#1a1000" stroke="#ffaa44" stroke-width="1"/>
  <text x="370" y="86" text-anchor="middle" fill="#ffaa44" font-size="9" font-weight="bold">PQC Migration</text>
  <text x="370" y="100" text-anchor="middle" fill="#888" font-size="9">Last window for orderly transition</text>

  <!-- 2030: Q-Day zone begins -->
  <circle cx="490" cy="220" r="6" fill="#ff4444"/>
  <line x1="490" y1="214" x2="490" y2="140" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="415" y="110" width="150" height="38" rx="4" fill="#1a0a0a" stroke="#ff4444" stroke-width="1"/>
  <text x="490" y="126" text-anchor="middle" fill="#ff4444" font-size="9" font-weight="bold">Q-Day Window Begins</text>
  <text x="490" y="140" text-anchor="middle" fill="#888" font-size="9">Quantum threat materializing</text>

  <!-- 2035: Q-Day -->
  <circle cx="770" cy="220" r="8" fill="#ff0000"/>
  <line x1="770" y1="212" x2="770" y2="120" stroke="#ff0000" stroke-width="2" stroke-dasharray="3,2"/>
  <rect x="695" y="90" width="150" height="38" rx="4" fill="#2a0000" stroke="#ff0000" stroke-width="1.5"/>
  <text x="770" y="106" text-anchor="middle" fill="#ff0000" font-size="9" font-weight="bold">Q-DAY</text>
  <text x="770" y="120" text-anchor="middle" fill="#888" font-size="9">Classical crypto vulnerable</text>

  <!-- OMNIX PQC Ready banner -->
  <rect x="80" y="260" width="360" height="50" rx="8" fill="#0a1a0a" stroke="#44ff88" stroke-width="2"/>
  <text x="260" y="282" text-anchor="middle" fill="#44ff88" font-size="12" font-weight="bold">✓ OMNIX — PQC READY TODAY</text>
  <text x="260" y="300" text-anchor="middle" fill="#888" font-size="10">ML-DSA-65 signatures on every decision</text>

  <!-- NOT READY banner -->
  <rect x="480" y="260" width="360" height="50" rx="8" fill="#1a0a0a" stroke="#ff4444" stroke-width="2"/>
  <text x="660" y="282" text-anchor="middle" fill="#ff4444" font-size="12" font-weight="bold">✗ CONVENTIONAL SYSTEMS</text>
  <text x="660" y="300" text-anchor="middle" fill="#888" font-size="10">RSA / ECDSA — retroactively vulnerable</text>

  <!-- Bottom equation -->
  <rect x="200" y="330" width="500" height="50" rx="8" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <text x="450" y="350" text-anchor="middle" fill="#e8d5a3" font-size="11" font-weight="bold">Data retention period (X) + Migration time (Z) &gt; Time to Q-Day (Y)</text>
  <text x="450" y="368" text-anchor="middle" fill="#ff4444" font-size="10">→ Most institutions are already behind schedule</text>

  <!-- Caption -->
  <text x="450" y="432" text-anchor="middle" fill="#555" font-size="9" letter-spacing="1">OMNIX QUANTUM · omnixquantum.net · Post-Quantum Governance Infrastructure</text>
</svg>
