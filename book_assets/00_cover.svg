<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="coverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="60%" style="stop-color:#050D18"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A227;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C9A227;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#D4AF37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A227;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E4E2;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#E5E4E2;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#C9A227;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C9A227;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#coverBg)"/>

  <!-- Glow -->
  <rect width="800" height="1100" fill="url(#glowCenter)"/>

  <!-- Top spine line -->
  <rect x="0" y="0" width="800" height="5" fill="#C9A227"/>

  <!-- Subtle grid background -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="0" y1="800" x2="800" y2="800" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="1100" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="1100" stroke="#0F2140" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="1100" stroke="#0F2140" stroke-width="0.5"/>

  <!-- Ghost hexagon structure (decorative) -->
  <polygon points="400,180 520,247 520,380 400,447 280,380 280,247" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.15"/>
  <polygon points="400,140 550,225 550,395 400,480 250,395 250,225" fill="none" stroke="#C9A227" stroke-width="0.5" opacity="0.10"/>
  <polygon points="400,100 580,203 580,410 400,513 220,410 220,203" fill="none" stroke="#C9A227" stroke-width="0.3" opacity="0.06"/>

  <!-- Center signal dot -->
  <circle cx="400" cy="313" r="4" fill="#C9A227" opacity="0.6"/>
  <circle cx="400" cy="313" r="12" fill="none" stroke="#C9A227" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="313" r="25" fill="none" stroke="#C9A227" stroke-width="0.3" opacity="0.15"/>

  <!-- Ghost text watermark -->
  <text x="400" y="370" text-anchor="middle" fill="url(#ghostGrad)" font-size="140" font-weight="bold" letter-spacing="-5" opacity="0.4">GHOST</text>

  <!-- Top label -->
  <text x="400" y="90" text-anchor="middle" fill="#94A3B8" font-size="11" letter-spacing="6">HAROLD NUNES</text>
  <rect x="160" y="98" width="480" height="1" fill="url(#goldLine)"/>

  <!-- Main Title -->
  <text x="400" y="540" text-anchor="middle" fill="#E5E4E2" font-size="82" font-weight="bold" letter-spacing="-2">GHOST</text>
  <text x="400" y="630" text-anchor="middle" fill="#C9A227" font-size="82" font-weight="bold" letter-spacing="-2">COMPLIANCE</text>

  <!-- Gold divider -->
  <rect x="100" y="650" width="600" height="2" fill="url(#goldLine)"/>

  <!-- Subtitle -->
  <text x="400" y="688" text-anchor="middle" fill="#94A3B8" font-size="16" letter-spacing="2">How Governance Systems Fail</text>
  <text x="400" y="712" text-anchor="middle" fill="#94A3B8" font-size="16" letter-spacing="2">While Appearing to Succeed</text>

  <!-- Description block -->
  <text x="400" y="760" text-anchor="middle" fill="#475569" font-size="12" letter-spacing="1">Post-Quantum Cryptography  ·  Continuous Validation</text>
  <text x="400" y="780" text-anchor="middle" fill="#475569" font-size="12" letter-spacing="1">MiCA · VARA · EU AI Act  ·  Nine Governance Verticals</text>

  <!-- Separator -->
  <rect x="300" y="808" width="200" height="1" fill="#1E293B"/>

  <!-- OMNIX branding -->
  <text x="400" y="840" text-anchor="middle" fill="#C9A227" font-size="13" letter-spacing="6">OMNIX QUANTUM</text>
  <text x="400" y="862" text-anchor="middle" fill="#475569" font-size="10" letter-spacing="3">omnixquantum.net</text>

  <!-- Bottom decorative bar -->
  <rect x="0" y="920" width="800" height="180" fill="#020810" opacity="0.8"/>
  <rect x="0" y="920" width="800" height="1" fill="#1E293B"/>

  <!-- Bottom author block -->
  <text x="400" y="970" text-anchor="middle" fill="#64748B" font-size="10" letter-spacing="3">FOUNDER · OMNIX QUANTUM</text>
  <text x="400" y="1000" text-anchor="middle" fill="#94A3B8" font-size="22" font-weight="bold" letter-spacing="3">HAROLD NUNES</text>
  <rect x="160" y="1016" width="480" height="1" fill="url(#goldLine)"/>

  <!-- Tagline -->
  <text x="400" y="1048" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="2">Governance Infrastructure for the Age of</text>
  <text x="400" y="1066" text-anchor="middle" fill="#C9A227" font-size="11" letter-spacing="2">Post-Quantum Institutions</text>

  <!-- Bottom spine line -->
  <rect x="0" y="1095" width="800" height="5" fill="#C9A227"/>
</svg>
