<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="900" height="560" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e8d5a3" font-size="22" font-weight="bold" letter-spacing="2">NINE GOVERNANCE VERTICALS</text>
  <text x="450" y="63" text-anchor="middle" fill="#888" font-size="12" letter-spacing="1">One architecture. Universal principles. Real governance.</text>
