  <text x="450" y="320" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">QUANTUM</text>
  <text x="450" y="337" text-anchor="middle" fill="#888" font-size="9">CAG · AVM · SRR</text>
  <text x="450" y="350" text-anchor="middle" fill="#888" font-size="9">FAT · PQC</text>

