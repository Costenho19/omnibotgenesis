  <line x1="450" y1="245" x2="450" y2="155" stroke="#c9a84c" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 2. Trading - top right -->
  <line x1="506" y1="264" x2="620" y2="165" stroke="#4a9eff" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 3. Medical - right -->
  <line x1="515" y1="310" x2="680" y2="260" stroke="#44ff88" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 4. Real Estate - bottom right -->
