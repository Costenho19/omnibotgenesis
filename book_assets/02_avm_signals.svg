  <line x1="60" y1="85" x2="940" y2="85" stroke="#C9A227" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon center: 500, 350 / radius 190 -->
  <!-- Vertices:
    Top:          500, 160
    Top-Right:    665, 255
    Bottom-Right: 665, 445
    Bottom:       500, 540
    Bottom-Left:  335, 445
    Top-Left:     335, 255
  -->

  <!-- Grid rings -->
