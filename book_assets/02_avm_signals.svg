  <polygon points="500,303 541,326 541,374 500,398 459,374 459,326" fill="none" stroke="#1E293B" stroke-width="1"/>
  <!-- 50% -->
  <polygon points="500,255 583,303 583,398 500,445 417,398 417,303" fill="none" stroke="#1E293B" stroke-width="1"/>
  <!-- 75% -->
