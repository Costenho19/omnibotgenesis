  <line x1="500" y1="350" x2="665" y2="255" stroke="#1E293B" stroke-width="1"/>
  <line x1="500" y1="350" x2="665" y2="445" stroke="#1E293B" stroke-width="1"/>
  <line x1="500" y1="350" x2="500" y2="540" stroke="#1E293B" stroke-width="1"/>
  <line x1="500" y1="350" x2="335" y2="445" stroke="#1E293B" stroke-width="1"/>
  <line x1="500" y1="350" x2="335" y2="255" stroke="#1E293B" stroke-width="1"/>

  <!-- Data polygon (82%, 71%, 65%, 78%, 88%, 74%)
    Top (82%):          500, 160 + (1-0.82)*190 = 160+34 = 194  → 500, 194
    Top-Right (71%):    500+0.71*165, 255+0.71*(-95) = 500+117, 255-67 = 617, 188  wait let me recalc

    Center: 500,350
    Vertex directions (from center):
    Top:         dx=0,   dy=-190  → at 100%: 500,160
    Top-Right:   dx=+165, dy=-95  → at 100%: 665,255
    Bot-Right:   dx=+165, dy=+95  → at 100%: 665,445
    Bottom:      dx=0,   dy=+190  → at 100%: 500,540
    Bot-Left:    dx=-165, dy=+95  → at 100%: 335,445
    Top-Left:    dx=-165, dy=-95  → at 100%: 335,255

    Prob(82%):      500+0*0.82, 350-190*0.82 = 500, 350-155.8 = 500, 194
    SigCoh(71%):    500+165*0.71, 350-95*0.71 = 500+117, 350-67 = 617, 283
    RiskExp(65%):   500+165*0.65, 350+95*0.65 = 500+107, 350+62 = 607, 412
    StressRes(78%): 500+0*0.78, 350+190*0.78 = 500, 350+148 = 500, 498
    TrendPer(88%):  500-165*0.88, 350+95*0.88 = 500-145, 350+84 = 355, 434
    LogicCon(74%):  500-165*0.74, 350-95*0.74 = 500-122, 350-70 = 378, 280
  -->
