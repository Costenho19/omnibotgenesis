<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFC-ATF-1 Whitepaper — OMNIX QUANTUM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #1a1a2e;
      color: #7c7cff;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .meta {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
    }
    .meta-item {
      text-align: center;
    }
    .meta-item .value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .meta-item .label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn {
      display: block;
      background: #5b5bd6;
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .btn:hover { background: #4a4ac4; }
    .btn-outline {
      display: block;
      background: transparent;
      color: #888;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 14px;
      border: 1px solid #222;
      transition: border-color 0.2s;
    }
    .btn-outline:hover { border-color: #444; color: #fff; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">RFC-ATF-1 · v1.0.0 · May 2026</div>
    <h1>Agent Trust Fabric<br>Whitepaper</h1>
    <p class="subtitle">Post-quantum cryptographic protocol for AI agent authority governance. Formally specified, TLA+ verified.</p>
    <div class="meta">
      <div class="meta-item">
        <div class="value">~22pp</div>
        <div class="label">Pages</div>
      </div>
      <div class="meta-item">
        <div class="value">ML-DSA-65</div>
        <div class="label">Crypto</div>
      </div>
      <div class="meta-item">
        <div class="value">TLA+</div>
        <div class="label">Verified</div>
      </div>
    </div>
    <a class="btn" href="/OMNIX-ATF-WHITEPAPER.pdf" download="OMNIX-ATF-WHITEPAPER.pdf">
      ⬇ Descargar PDF
    </a>
    <a class="btn-outline" href="https://github.com/Costenho19/rfc-atf-1" target="_blank">
      Ver en GitHub →
    </a>
    <div class="footer">OMNIX QUANTUM LTD · Harold Nunes</div>
  </div>
</body>
</html>
