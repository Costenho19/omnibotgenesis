[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/pip install ./omnix_core --no-deps -q && echo '[install] omnix_core OK' || echo '[install] omnix_core FAILED'",
  "npm install"
]

[phases.build]
cmds = [
  "/opt/venv/bin/python3 -c \"import omnix_core; print('[build] omnix_core importable OK')\" || echo '[build] omnix_core NOT importable'",
  "rm -rf dist node_modules/.vite .vite && npm run build"
]

[start]
cmd = "/opt/venv/bin/gunicorn api.server:app --bind 0.0.0.0:${PORT:-8080} --workers 4 --timeout 120 --worker-connections 1000 --keep-alive 5"
