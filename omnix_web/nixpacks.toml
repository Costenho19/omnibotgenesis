[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "npm install"
]

[phases.build]
cmds = ["test -d dist/assets && echo 'Pre-built dist found, skipping npm build' || npm run build"]

[start]
cmd = "/opt/venv/bin/gunicorn api.server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
