[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/pip install ../omnix_core --no-deps --quiet || /opt/venv/bin/pip install ./omnix_core --no-deps --quiet || true",
  "npm install"
]

[phases.build]
cmds = ["rm -rf dist node_modules/.vite .vite && npm run build"]

[start]
cmd = "bash start_server.sh"
