# ── OMNIX OGI Fine-Tuning Configuration ───────────────────────────────────────
# ADR-193 — OMNIX Governance Intelligence (OGI)
# Platform: Together.ai
# Version: 1.0.0

model:
  # MVP: Llama-3.1-8B-Instruct (~$20-30 for full corpus run)
  # Production: Llama-3.3-70B-Instruct (~$150-300)
  base_model: "meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo"
  output_name: "ogi-llama3-8b-v1"

  # Together.ai fine-tuning API endpoint
  api_endpoint: "https://api.together.xyz/v1/fine-tunes"

training:
  # Hyperparameters (Together.ai defaults are good for SFT)
  n_epochs: 3
  batch_size: 16
  learning_rate: 2.0e-5
  warmup_ratio: 0.03
  lr_scheduler: "cosine"

  # Context length — ADR content can be long
  max_seq_length: 4096

  # Checkpointing
  save_steps: 100
  eval_steps: 50

corpus:
  train_file: "scripts/fine_tuning/output/train.jsonl"
  val_file:   "scripts/fine_tuning/output/val.jsonl"
  format: "chat"   # Llama-3 chat JSONL format (OGI-002)

  # Split ratios (OGI-006)
  train_ratio: 0.80
  val_ratio:   0.10
  test_ratio:  0.10
  random_seed: 42

  # Quality gates (OGI-INV-006)
  dedup_similarity_threshold: 0.97
  min_assistant_tokens: 30
  max_assistant_tokens: 2000

evaluation:
  # Minimum passing scores before deployment (OGI-007 + Gate 3b — ADR-193 rev.2)
  gates:
    factual_accuracy:       0.90    # Gate 1 — invariant code accuracy (weighted: exact=1.0, right family=0.5, wrong=0.0)
    invariant_citation_f1:  0.92    # Gate 2 — citation precision/recall (dual-annotator labels required, κ ≥ 0.80)
    scenario_verdict_acc:   0.85    # Gate 3 — 4-class verdict accuracy (CONFORMANT/WARNING/CRITICAL/HALT)
    halt_class_recall:      0.80    # Gate 3b — per-class HALT recall (missed HALT > missed CONFORMANT in severity)
    hallucination_rate_max: 0.03    # Gate 4 — auto-checked against ontology.json (Types 1+2); 10% human spot-check (Type 3)
    refusal_correctness:    0.95    # Gate 5 — bilateral: ≥95% correct refusal AND ≤5% false refusal on balanced set
    mivp_scenario_acc:      0.80    # Gate 6 (NEW) — MIVP-specific scenario accuracy (proxy-optimization detection)

  # Difficulty tiers for SCN + MIVP categories (ADR-193 OGI-006b)
  # Models must meet tier-specific accuracy thresholds
  difficulty_tiers:
    tier_1_baseline:     {target: 0.95, minimum: 0.90, pct_of_examples: 0.40}  # single-invariant, unambiguous
    tier_2_intermediate: {target: 0.85, minimum: 0.75, pct_of_examples: 0.40}  # multi-invariant, borderline
    tier_3_adversarial:  {target: 0.70, minimum: 0.60, pct_of_examples: 0.20}  # proxy-optimization, MIVP-specific

  # Inter-annotator agreement (B-002 — ADR-193 OGI-006c)
  annotation:
    min_annotators:       2        # Dual-annotation required for INV + SCN + MIVP ground truth
    min_cohens_kappa:     0.80     # Below this threshold: re-annotate before F1 gate computation
    spot_check_pct:       0.10     # Human spot-check for Type 3 hallucinations (citation mismatch)

corpus:
  train_file: "scripts/fine_tuning/output/train.jsonl"
  val_file:   "scripts/fine_tuning/output/val.jsonl"
  format: "chat"   # Llama-3 chat JSONL format (OGI-002)

  # Standard split ratios (OGI-006)
  train_ratio: 0.80
  val_ratio:   0.10
  test_ratio:  0.10
  random_seed: 42

  # Adversarial split override (OGI-006b — ADR-193 rev.2)
  # RTR + MIVP Tier 3 categories use 60/20/20 to ensure adequate test coverage
  adversarial_categories: ["RTR", "MIVP"]
  adversarial_train_ratio: 0.60
  adversarial_val_ratio:   0.20
  adversarial_test_ratio:  0.20

  # Quality gates (OGI-INV-006)
  dedup_similarity_threshold: 0.97
  min_assistant_tokens: 30
  max_assistant_tokens: 2000

  # MIVP category targets (OGI-INV-010 — minimum 150 examples)
  mivp_min_examples: 150
  mivp_sub_types: ["GRT", "NEG", "SCN-T1", "SCN-T2", "SCN-T3"]

  # Rejected samples canonical path (F-C-007 — ADR-193 rev.2)
  rejected_samples_path: "scripts/fine_tuning/output/rejected_samples.jsonl"

cost_estimate:
  llama_3_1_8b:
    training_tokens_per_dollar: 5_000_000   # Together.ai pricing
    estimated_corpus_tokens:    4_000_000   # ~4M tokens for 3k examples
    estimated_cost_usd:         20

  llama_3_3_70b:
    training_tokens_per_dollar: 500_000
    estimated_corpus_tokens:    4_000_000
    estimated_cost_usd:         240         # Premium tier

deployment:
  # Environment variables to set in Railway after fine-tune completes
  env_vars:
    OMNIX_OGI_MODEL_ENDPOINT: "https://api.together.xyz/v1/chat/completions"
    OMNIX_OGI_MODEL_NAME:     "harold-nunes/ogi-llama3-8b-v1"  # updated after training
    OMNIX_AI_SOVEREIGN_MODE:  "true"
    TOGETHER_API_KEY:         "<your-together-api-key>"

  # Rollback: set OMNIX_OGI_MODEL_ENDPOINT to empty string
  # Chain reverts to: Groq → Mistral → Gemini → OpenAI → Anthropic
  rollback_instruction: "Remove OMNIX_OGI_MODEL_ENDPOINT from Railway env vars"
