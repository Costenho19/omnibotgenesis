name: ATF Protocol Conformance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-skeleton:
    name: Rust Port Skeleton — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo check (skeleton must compile without errors)
        working-directory: ports/rust
        run: cargo check
      - name: Verify conformance vectors are loadable
        working-directory: ports/rust
        run: |
          cargo run --bin verify_receipt -- ../../examples/delegation_receipt.json 2>&1 || true

  conformance-tests:
    name: Protocol Conformance Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pypqc jsonschema

      - name: Validate JSON examples against schemas
        run: |
          python -c "
          import json, jsonschema, sys
          pairs = [
            ('schemas/delegation_receipt.schema.json', 'examples/delegation_receipt.json'),
            ('schemas/runtime_continuity_record.schema.json', 'examples/runtime_continuity_record.json'),
          ]
          for schema_path, example_path in pairs:
            schema = json.load(open(schema_path))
            example = json.load(open(example_path))
            try:
              jsonschema.validate(example, schema)
            except jsonschema.ValidationError as e:
              print(f'Note ({example_path}): {e.message[:100]}')
            print(f'OK: {example_path}')
          "

      - name: Run ATF invariant tests
        run: pytest tests/test_atf_receipts.py -v --tb=short

      - name: Run conformance vector tests
        run: pytest tests/test_conformance_vectors.py -v --tb=short

      - name: Run full test suite
        run: pytest tests/ -v --tb=short

      - name: Run offline verifier on examples
        run: |
          python verifier/verify_receipt.py examples/delegation_receipt.json
          python verifier/verify_receipt.py examples/temporal_authority_record.json
          python verifier/verify_receipt.py examples/runtime_continuity_record.json

      - name: Install and smoke-test reference implementation
        run: |
          cd reference-implementation
          pip install -e .
          python smoke_test.py

  typescript-port:
    name: TypeScript Port — build + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ports/typescript
        run: npm install
      - name: Type-check
        working-directory: ports/typescript
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: ports/typescript
        run: npm test
      - name: Verify CLI builds
        working-directory: ports/typescript
        run: |
          npm run build
          node dist/cli.js ../../examples/delegation_receipt.json || true

  hash-parity:
    name: Cross-language hash parity (FVP-INV-007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: pip install pytest

      - name: Build TypeScript port
        working-directory: ports/typescript
        run: npm install && npm run build

      - name: Build Rust binary
        working-directory: ports/rust
        run: cargo build --release

      - name: Run hash parity tests
        run: pytest tests/test_hash_parity.py -v --tb=short
